<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Donut body -->
  <circle cx="50" cy="50" r="45" fill="#d4883a"/>
  <circle cx="50" cy="50" r="18" fill="white"/>
  <!-- Pink frosting -->
  <path d="M50 8 A42 42 0 0 1 92 50 A42 42 0 0 1 50 92 A42 42 0 0 1 8 50 A42 42 0 0 1 50 8 Z" fill="#ff69b4"/>
  <circle cx="50" cy="50" r="18" fill="white"/>
  <!-- Frosting drips -->
  <ellipse cx="20" cy="58" rx="5" ry="8" fill="#ff69b4"/>
  <ellipse cx="78" cy="62" rx="4" ry="7" fill="#ff69b4"/>
  <ellipse cx="50" cy="92" rx="5" ry="6" fill="#ff69b4"/>
  <ellipse cx="35" cy="90" rx="4" ry="5" fill="#ff69b4"/>
  <!-- Donut edge visible below frosting -->
  <path d="M8 55 A42 42 0 0 0 92 55" fill="#d4883a" opacity="0.5"/>
  <!-- Sprinkles -->
  <rect x="30" y="20" width="3" height="8" rx="1.5" fill="#ff4444" transform="rotate(-30 31.5 24)"/>
  <rect x="60" y="18" width="3" height="8" rx="1.5" fill="#44bb44" transform="rotate(20 61.5 22)"/>
  <rect x="72" y="35" width="3" height="8" rx="1.5" fill="#ffdd00" transform="rotate(-15 73.5 39)"/>
  <rect x="22" y="38" width="3" height="8" rx="1.5" fill="#4488ff" transform="rotate(25 23.5 42)"/>
  <rect x="45" y="12" width="3" height="8" rx="1.5" fill="#ffdd00" transform="rotate(10 46.5 16)"/>
  <rect x="65" y="60" width="3" height="8" rx="1.5" fill="#ff4444" transform="rotate(-40 66.5 64)"/>
  <rect x="28" y="62" width="3" height="8" rx="1.5" fill="#44bb44" transform="rotate(35 29.5 66)"/>
  <rect x="50" y="72" width="3" height="8" rx="1.5" fill="#4488ff" transform="rotate(-20 51.5 76)"/>
  <rect x="38" y="42" width="3" height="8" rx="1.5" fill="#ff4444" transform="rotate(45 39.5 46)"/>
  <rect x="58" y="44" width="3" height="8" rx="1.5" fill="#ffdd00" transform="rotate(-10 59.5 48)"/>
  <!-- Donut hole -->
  <circle cx="50" cy="50" r="18" fill="white"/>
</svg>
